name: Transfer 384-well plate to incubator - Workflow

metadata:
  author: Casey Stone
  info: Workflow to transfer the 384-well plate to incubator
  version: 0.1

parameters:
  json_inputs:
    - key: microplate_id

steps:
  - name: Replace lid on 384-well
    node: platecrane_poly
    action: replace_lid
    args:
      plate_type: "flat_bottom_96well"
    locations:
      source: "LidNest1"
      target: "Solo.Position2"

  - name: Transfer 384-well to Liconic
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
    locations:
      source: "Solo.Position2"
      target: "Liconic.Nest"
    comment: Place 384-well plate on incubator nest

  - name: Load Liconic
    node: liconic_lisa
    action: load_plate
    args:
      plate_type: "microplate"
    params:
      args:
        plate_id: microplate_id
    comment: Load 384-well plate into incubator

  # # no shaking needed for 384 well plates