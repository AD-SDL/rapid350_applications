name: Demo with sealing - Workflow

metadata:
  author: Casey Stone, Abraham Stroka 
  info: Demonstration Workflow with sealing for BIO350 Workcell
  version: 0.1

parameters: 
  json_inputs:
    - key: tip_box_position
    - key: shaker_speed
  file_inputs:
    - key: protocol_file

steps:
  - name: Move plate from Stack1 to Solo.Position1
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well" 
    locations:
      source: "Stack1"
      target: "Solo.Position1"

  - name: Remove lid    
    node: platecrane_poly
    action: remove_lid
    args:
      plate_type: "flat_bottom_96well"
    locations:
      source: "Solo.Position1"
      target: "LidNest1"
  
  - name: Move Safe
    node: platecrane_poly
    action: move
    locations:
      target: "Safe"

  - name: Refill SOLO Tips
    node: solo_sam
    action: refill_tips
    params:
      args:
        position: tip_box_position

  - name: Run SOLO Protocol
    node: solo_sam
    action: run_protocol
    files:
      protocol_file: protocol_file

  - name: Open Hidex
    node: hidex_howard
    action: open

  - name: Move plate from Solo Position1 to Hidex Nest
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
      height_offset: 8
    locations:
      source: "Solo.Position1"
      target: "Hidex.Nest"      

  - name: Close Hidex
    node: hidex_howard
    action: close

  - name: Open Hidex
    node: hidex_howard
    action: open

  - name: Move plate from Hidex to Sealer
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
      height_offset: 8
    locations:
      source: "Hidex.Nest"
      target: "Sealer.Nest"

  - name: Move Safe
    node: platecrane_poly
    action: move
    locations:
      target: "Safe"

  - name: Close Hidex
    node: hidex_howard
    action: close

  - name: Seal deep well
    node: sealer_harp
    action: seal

  - name: Move plate from Sealer to Liconic
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
    locations:
      source: "Sealer.Nest"
      target: "Liconic.Nest"

  - name: Load Liconic
    node: liconic_lisa
    action: load_plate
    args: 
      plate_id: "1"
      plate_type: "microplate"

  - name: Start shaker at set speed
    node: liconic_lisa
    action: begin_shake
    params:
      args:
        shaker_speed: shaker_speed

  - name: Unload Liconic
    node: liconic_lisa
    action: unload_plate
    args: 
      plate_id: "1"

  - name: Move plate from Liconic to Peeler
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
    locations:
      source: "Liconic.Nest"
      target: "Peeler.Nest"

  - name: Peel
    node: peeler_potato
    action: peel
  
  - name: Move plate from Peeler.Nest to Solo.Positon1
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
    locations: 
      source: "Peeler.Nest"
      target: "Solo.Position1"

  - name: Open Hidex
    node: hidex_howard
    action: open

  - name: Move plate from Solo.Positon1 to Hidex.Nest
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
      height_offset: 8
    locations: 
      source: "Solo.Position1"
      target: "Hidex.Nest"

  - name: Close Hidex
    node: hidex_howard
    action: close

  - name: Open Hidex
    node: hidex_howard
    action: open

  - name: Move plate from Hidex to Solo.Position1
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
      height_offset: 8
    locations:
      source: "Hidex.Nest"
      target: "Solo.Position1"

  - name: Close Hidex
    node: hidex_howard
    action: close

  - name: Replace lid    
    node: platecrane_poly
    action: replace_lid
    args:
      plate_type: "flat_bottom_96well"
    locations:
      source: "LidNest1"
      target: "Solo.Position1"

  - name: Move plate from Solo.Position1 to Stack5 (trash)
    node: platecrane_poly
    action: transfer
    args:
      plate_type: "flat_bottom_96well"
    locations: 
      source: "Solo.Position1"
      target: "Stack5"
